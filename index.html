<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BTC Dashboard">
  <title>BTC On-Chain Dashboard</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-card: #0f1629;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --border: #1e2a44;
      --green: #22d3ee;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --red: #f87171;
      --btc: #f7931a;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .title { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; }
    .btc-icon {
      width: 28px; height: 28px; background: var(--btc); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; font-size: 16px;
    }
    .header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .currency-switch {
      display: inline-flex; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 3px; gap: 2px;
    }
    .currency-switch button {
      background: transparent; border: none; color: var(--text-dim);
      padding: 4px 10px; border-radius: 7px; font-size: 11px;
      font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
    }
    .currency-switch button.active { background: var(--btc); color: white; }
    .currency-switch button:active { transform: scale(0.95); }
    .refresh-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px; border-radius: 10px;
      font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn:disabled { opacity: 0.5; }
    .refreshing .refresh-icon { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .analyze-btn {
      background: linear-gradient(135deg, #1e2a44, #0f1629);
      border: 1px solid var(--accent); color: var(--text);
      padding: 8px 14px; border-radius: 10px; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .analyze-btn:active { transform: scale(0.97); }
    .analyze-btn:disabled { opacity: 0.5; }
    .price-clickable { cursor: pointer; user-select: none; }
    .price-clickable:active { opacity: 0.7; }
    .price-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
    .price { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .price-change { margin-left: 8px; color: var(--text-muted); font-size: 13px; }
    .timestamp { font-size: 11px; color: var(--text-dim); }
    .aggregate {
      border-radius: 16px; padding: 20px; margin-bottom: 24px;
      border: 1px solid; background: var(--bg-card);
      cursor: pointer;
    }
    .aggregate-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .aggregate-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 6px; }
    .aggregate-score { font-size: 42px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
    .aggregate-score-unit { font-size: 13px; color: var(--text-muted); margin-left: 4px; }
    .aggregate-status { margin-top: 10px; font-weight: 600; font-size: 15px; }
    .circle-wrap { position: relative; width: 84px; height: 84px; }
    .circle-bg, .circle-fill { fill: none; stroke-width: 7; }
    .circle-bg { stroke: var(--border); }
    .circle-fill { stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; transition: stroke-dasharray 0.8s; }
    .aggregate-body { display: none; margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
    .aggregate.expanded .aggregate-body { display: block; }
    .aggregate-hint { font-size: 10px; color: var(--text-dim); text-align: right; margin-top: 6px; opacity: 0.6; }
    .price-alarm {
      margin-top: 10px; padding: 10px 12px;
      background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.4);
      border-radius: 10px; font-size: 12px; color: #fca5a5; font-weight: 600;
    }
    .price-alarm span { font-weight: 400; font-size: 11px; display: block; margin-top: 2px; color: #fca5a5; opacity: 0.85; }
    .category { margin-bottom: 16px; }
    .category-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; padding: 0 4px; }
    .category-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 600; }
    .category-score { font-size: 11px; font-variant-numeric: tabular-nums; color: var(--text-dim); }
    .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
    .metric-card { border-radius: 14px; border: 1px solid; overflow: hidden; cursor: pointer; }
    .metric-card.expanded { grid-column: 1 / -1; }
    .metric-head { padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .metric-head:active { opacity: 0.8; }
    .metric-main { flex: 1; min-width: 0; }
    .metric-title-row { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 2px; }
    .metric-desc { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
    .metric-value-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .metric-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .metric-label { font-size: 11px; font-weight: 500; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .chevron { color: var(--text-dim); font-size: 10px; transition: transform 0.2s; margin-top: 3px; }
    .metric-card.expanded .chevron { transform: rotate(180deg); }
    .metric-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; border-top: 1px solid transparent; }
    .metric-card.expanded .metric-body { max-height: 600px; border-top-color: var(--border); }
    .metric-body-inner { padding: 14px 16px; }
    .metric-info { font-size: 12px; line-height: 1.55; color: var(--text-muted); margin-bottom: 14px; }
    .metric-info strong { color: var(--text); }
    .metric-thresholds { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; font-size: 10px; }
    .threshold { padding: 3px 8px; border-radius: 6px; background: rgba(30,42,68,0.5); color: var(--text-muted); }
    .chart-wrap { position: relative; background: rgba(10,14,26,0.5); border-radius: 8px; padding: 8px 4px 4px; }
    .chart-wrap svg { width: 100%; height: 160px; display: block; }
    .chart-tooltip { position: absolute; top: 8px; left: 12px; font-size: 11px; color: var(--text); pointer-events: none; font-variant-numeric: tabular-nums; }
    .t-val { font-weight: 600; }
    .t-date { color: var(--text-dim); margin-left: 6px; font-size: 10px; }
    .chart-range { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-dim); padding: 4px 4px 0; }
    .no-history { color: var(--text-dim); font-size: 11px; padding: 20px; text-align: center; background: rgba(10,14,26,0.5); border-radius: 8px; }
    .green  { color: var(--green); }
    .yellow { color: var(--yellow); }
    .orange { color: var(--orange); }
    .red    { color: var(--red); }
    .bg-green  { background: rgba(34,211,238,0.06); border-color: rgba(34,211,238,0.3); }
    .bg-yellow { background: rgba(251,191,36,0.06); border-color: rgba(251,191,36,0.3); }
    .bg-orange { background: rgba(251,146,60,0.06); border-color: rgba(251,146,60,0.3); }
    .bg-red    { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.3); }
    .bg-gray   { background: var(--bg-card); border-color: var(--border); }
    .dot-green  { background: var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-orange { background: var(--orange); }
    .dot-red    { background: var(--red); }
    .dot-gray   { background: var(--text-dim); }
    .stroke-green  { stroke: var(--green); }
    .stroke-yellow { stroke: var(--yellow); }
    .stroke-orange { stroke: var(--orange); }
    .stroke-red    { stroke: var(--red); }
    .stroke-gray   { stroke: var(--text-dim); }
    .error-box { border: 1px solid rgba(248,113,113,0.3); background: rgba(248,113,113,0.05); padding: 12px; border-radius: 10px; margin-bottom: 16px; font-size: 12px; color: #fca5a5; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .analysis-box { background: var(--bg-card); border: 1px solid var(--accent); border-radius: 16px; padding: 16px; margin-bottom: 24px; }
    .analysis-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
    .analysis-content { font-size: 13px; line-height: 1.65; color: var(--text-muted); }
    .analysis-content strong { color: var(--text); }
  </style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">Lade Daten…</div>
</div>

<script>
const WORKER_URL = "https://btc-dashboard.y68xps2sdk.workers.dev";

let lastData = null;
let lastError = null;
let isLoading = false;
let expandedCard = null;
let currency = localStorage.getItem('btc_currency') || 'CHF';
let aggExpanded = false;

// ============ DATA ============
async function fetchData() {
  if (isLoading) return;
  isLoading = true;
  lastError = null;
  render();
  try {
    const r = await fetch(WORKER_URL);
    if (!r.ok) throw new Error("HTTP " + r.status);
    lastData = await r.json();
  } catch (e) {
    lastError = e.message;
  }
  isLoading = false;
  render();
}

// ============ CURRENCY ============
function convertPrice(usdValue) {
  if (usdValue == null || !lastData?.data) return null;
  const d = lastData.data;
  if (currency === 'USD') return usdValue;
  if (currency === 'EUR') return usdValue * (d.fx_usd_eur || 0.92);
  return usdValue * (d.fx_usd_chf || 0.9);
}

function toggleCurrency() {
  const cycle = ['CHF', 'USD', 'EUR'];
  currency = cycle[(cycle.indexOf(currency) + 1) % cycle.length];
  localStorage.setItem('btc_currency', currency);
  render();
}

// ============ DEEPSEEK ============
async function requestAnalysis() {
  const btn = document.getElementById('analyzeBtn');
  const box = document.getElementById('analysisBox');
  const content = document.getElementById('analysisContent');
  if (!lastData?.data) return;
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Analysiere…';
  box.style.display = 'block';
  content.innerHTML = '🧠 Analysiere…';
  try {
    const d = lastData.data;
    const drawdownPct = (d.price_usd && d.ath_usd) ? ((d.price_usd - d.ath_usd) / d.ath_usd) * 100 : null;
    const payload = {
      price_chf: convertPrice(d.price_usd),
      price_usd: d.price_usd,
      drawdown_pct: drawdownPct,
      mvrv_z: d.mvrv_z,
      mvrv_ratio: d.mvrv_ratio,
      mayer_multiple: d.mayer_multiple,
      nupl: d.nupl,
      sopr: d.sopr,
      supply_in_profit_pct: d.supply_in_profit_pct,
      pi_cycle_ratio: d.pi_cycle_ratio,
      fear_greed: d.fear_greed,
      hashrate_30d_change_pct: d.hashrate_30d_change_pct
    };
    const response = await fetch(WORKER_URL + '/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    if (result.error) throw new Error(result.error);
    content.innerHTML = mdToHtml(result.analysis);
  } catch (e) {
    content.innerHTML = `<span style="color:var(--red)">Fehler: ${e.message}</span>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>🧠</span> Experten-Analyse';
  }
}

function closeAnalysis() {
  document.getElementById('analysisBox').style.display = 'none';
}

function mdToHtml(md) {
  return md
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p style="margin-top:10px">')
    .replace(/\n/g, '<br>');
}

// ============ SCORING ============
function scoreMvrvZ(v)     { if(v==null)return null; if(v<0)return{score:95,level:'green',label:'Historischer Boden'}; if(v<2)return{score:75,level:'green',label:'Unterbewertet'}; if(v<4)return{score:50,level:'yellow',label:'Neutral'}; if(v<6)return{score:25,level:'orange',label:'Erhitzt'}; return{score:5,level:'red',label:'Top-Zone'}; }
function scoreMvrvRatio(v) { if(v==null)return null; if(v<1.0)return{score:95,level:'green',label:'Unter Realized'}; if(v<1.5)return{score:75,level:'green',label:'Günstig'}; if(v<2.5)return{score:50,level:'yellow',label:'Normal'}; if(v<3.5)return{score:25,level:'orange',label:'Erhitzt'}; return{score:5,level:'red',label:'Top-Zone'}; }
function scoreMayer(v)     { if(v==null)return null; if(v<1.0)return{score:95,level:'green',label:'Unterbewertet'}; if(v<1.5)return{score:75,level:'green',label:'Günstig'}; if(v<2.0)return{score:50,level:'yellow',label:'Neutral'}; if(v<2.4)return{score:25,level:'orange',label:'Erhöht'}; return{score:5,level:'red',label:'Top-Zone'}; }
function scoreNupl(v)      { if(v==null)return null; if(v<0)return{score:95,level:'green',label:'Capitulation'}; if(v<0.25)return{score:75,level:'green',label:'Hope/Fear'}; if(v<0.5)return{score:55,level:'yellow',label:'Optimism'}; if(v<0.75)return{score:25,level:'orange',label:'Belief'}; return{score:5,level:'red',label:'Euphoria'}; }
function scoreSopr(v)      { if(v==null)return null; if(v<0.97)return{score:90,level:'green',label:'Kapitulation'}; if(v<1.0)return{score:70,level:'green',label:'Verlust-Realisierung'}; if(v<1.03)return{score:45,level:'yellow',label:'Übergang'}; if(v<1.05)return{score:30,level:'orange',label:'Gewinnmitnahme'}; return{score:10,level:'red',label:'Starke Gewinne'}; }
function scoreSupply(p)    { if(p==null)return null; if(p<0.5)return{score:90,level:'green',label:'Bärenmarkt-Boden'}; if(p<0.7)return{score:70,level:'green',label:'Unterbewertet'}; if(p<0.85)return{score:50,level:'yellow',label:'Normal'}; if(p<0.95)return{score:25,level:'orange',label:'Erhitzt'}; return{score:5,level:'red',label:'Euphorie'}; }
function scorePi(v)        { if(v==null)return null; if(v<0.5)return{score:90,level:'green',label:'Weit vom Top'}; if(v<0.75)return{score:65,level:'green',label:'Sicher'}; if(v<0.9)return{score:40,level:'yellow',label:'Achtung'}; if(v<1.0)return{score:15,level:'orange',label:'Nahe Signal'}; return{score:0,level:'red',label:'TOP SIGNAL'}; }
function scoreDD(pct)      { if(pct==null)return null; const dd=Math.abs(pct); if(dd>70)return{score:95,level:'green',label:'Kapitulationszone'}; if(dd>40)return{score:75,level:'green',label:'Starker Abschlag'}; if(dd>20)return{score:55,level:'yellow',label:'Moderat'}; if(dd>5)return{score:35,level:'yellow',label:'Nahe ATH'}; return{score:15,level:'orange',label:'Am/über ATH'}; }
function scoreFG(v)        { if(v==null)return null; if(v<25)return{score:90,level:'green',label:'Extreme Angst'}; if(v<45)return{score:65,level:'green',label:'Angst'}; if(v<55)return{score:50,level:'yellow',label:'Neutral'}; if(v<75)return{score:25,level:'orange',label:'Gier'}; return{score:5,level:'red',label:'Extreme Gier'}; }

function aggregateLevel(score) {
  if (score == null) return { level:'gray',  label:'Lade…',        icon:'⋯' };
  if (score >= 75)   return { level:'green', label:'Akkumulation', icon:'❄️' };
  if (score >= 55)   return { level:'green', label:'Günstig',      icon:'📈' };
  if (score >= 40)   return { level:'yellow',label:'Neutral',      icon:'⚖️' };
  if (score >= 25)   return { level:'orange',label:'Vorsicht',     icon:'⚠️' };
  return               { level:'red',   label:'Distribution', icon:'🔥' };
}

function catAvg(scores) {
  const v = scores.filter(Boolean);
  if (!v.length) return null;
  return Math.round(v.reduce((a, s) => a + s.score, 0) / v.length);
}

function fmt(n, digits=2) {
  if (n==null||isNaN(n)) return '—';
  return n.toLocaleString('de-CH',{maximumFractionDigits:digits,minimumFractionDigits:digits});
}
function fmtInt(n) {
  if (n==null||isNaN(n)) return '—';
  return n.toLocaleString('de-CH',{maximumFractionDigits:0});
}
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('de-CH',{day:'2-digit',month:'short',year:'numeric'});
}

// ============ METRICS ============
const METRICS = {
  mvrv_z: {
    title:'MVRV Z-Score', desc:'Markt- vs Realized Cap, normalisiert',
    info:'<strong>MVRV Z-Score</strong> misst, wie weit Bitcoins Marktwert von seinem "Realized Value" entfernt ist, statistisch normalisiert. Top-1-Metrik für Makro-Zyklus-Analyse. Historische Böden unter 0, historische Tops über 7.',
    thresholds:['< 0 Boden','0-4 Normal','4-6 Erhitzt','> 6 Top-Zone'],
    score:scoreMvrvZ, format:v=>fmt(v), dataKey:'mvrv_z', historyKey:'mvrv_z',
  },
  mvrv_ratio: {
    title:'MVRV Ratio', desc:'Preis / Realized Price',
    info:'<strong>MVRV Ratio</strong> ist der aktuelle BTC-Preis geteilt durch den durchschnittlichen Einstandspreis aller BTC (Realized Price). Unter 1.0 = alle Coins im Verlust, historische Kapitulationszone.',
    thresholds:['< 1.0 Unter Einstand','1.0-1.5 Günstig','1.5-2.5 Normal','> 3.7 Top-Zone'],
    score:scoreMvrvRatio, format:v=>fmt(v), dataKey:'mvrv_ratio', historyKey:'mvrv_ratio',
  },
  mayer: {
    title:'Mayer Multiple', desc:'Preis / 200-Tage MA',
    info:'<strong>Mayer Multiple</strong> setzt den aktuellen Preis ins Verhältnis zum 200-Tage-Durchschnitt. Unter 1.0 = günstig, über 2.4 = historisch nahe Tops.',
    thresholds:['< 1.0 Günstig','1.5-2.0 Neutral','> 2.4 Top-Zone'],
    score:scoreMayer, format:v=>fmt(v), dataKey:'mayer_multiple', historyKey:'mayer',
  },
  nupl: {
    title:'NUPL', desc:'Net Unrealized Profit/Loss',
    info:'<strong>NUPL</strong> zeigt, wie viel Prozent aller Coins im unrealisierten Gewinn sind. Phasen: Capitulation → Hope/Fear → Optimism → Belief → Euphoria. Über 0.75 historisch Zyklushochs.',
    thresholds:['< 0 Capitulation','0.25-0.5 Optimism','> 0.75 Euphoria'],
    score:scoreNupl, format:v=>fmt(v), dataKey:'nupl', historyKey:'nupl',
  },
  sopr: {
    title:'SOPR', desc:'Spent Output Profit Ratio',
    info:'<strong>SOPR</strong> misst, ob bewegte Coins im Gewinn oder Verlust verkauft werden. Unter 1 = Kapitulation. Über 1.05 = starke Gewinnmitnahmen.',
    thresholds:['< 1.0 Verluste','1.0-1.05 Normal','> 1.05 Gewinne'],
    score:scoreSopr, format:v=>fmt(v,3), dataKey:'sopr', historyKey:'sopr',
  },
  supply_in_profit_pct: {
    title:'Supply in Profit', desc:'Anteil Coins im Gewinn',
    info:'<strong>Supply in Profit</strong> – Prozentsatz aller Coins über ihrem Kaufpreis. Unter 50% = Bärenmarkt-Boden. Über 95% = euphorische Zone.',
    thresholds:['< 50% Boden','70-85% Normal','> 95% Euphorie'],
    score:scoreSupply, format:v=>fmt(v*100,1)+'%', dataKey:'supply_in_profit_pct', historyKey:'supply_in_profit_pct',
  },
  pi_cycle: {
    title:'Pi Cycle Top', desc:'111DMA / (350DMA × 2)',
    info:'<strong>Pi Cycle Top</strong> – Kreuzung des 111-Tage-MA über den doppelten 350-Tage-MA signalisierte historisch (2013, 2017, 2021) das Zyklushoch innerhalb von Tagen.',
    thresholds:['< 0.5 Weit vom Top','< 0.9 Sicher','≥ 1.0 TOP-SIGNAL'],
    score:scorePi, format:v=>fmt(v), dataKey:'pi_cycle_ratio', historyKey:'pi_cycle',
  },
  drawdown: {
    title:'Drawdown vom ATH', desc:'Wie weit vom Hoch entfernt',
    info:'<strong>Drawdown vom ATH</strong> – Einfachste Zyklus-Positionsanzeige. Über 70% Drawdown = historische Kapitulationszone. Nahe 0% = am ATH, Vorsicht.',
    thresholds:['> 70% Kapitulation','-20 bis -40% Normal','< -5% Am ATH'],
    score:scoreDD, format:v=>fmt(v,1)+'%', dataKey:null, historyKey:'drawdown',
  },
  fear_greed: {
    title:'Fear & Greed', desc:'Markt-Sentiment',
    info:'<strong>Fear & Greed Index</strong> aggregiert Volatilität, Momentum, Social Media und mehr. Extreme (unter 25, über 75) sind historisch aussagekräftig.',
    thresholds:['0-25 Extreme Angst','45-55 Neutral','75-100 Extreme Gier'],
    score:scoreFG, format:v=>fmtInt(v), dataKey:'fear_greed', historyKey:'fear_greed',
  },
  hashrate: {
    title:'Hashrate 30d', desc:'Netzwerkgesundheit (Bonus)',
    info:'<strong>Hashrate-Trend</strong> zeigt die 30-Tage-Veränderung der Rechenleistung. Steigend = Miner investieren. Fallend = Miner-Kapitulation, oft Nähe Zyklustief. Nicht im Score.',
    thresholds:['> 5% Wachstum','0-5% Stabil','< -10% Kapitulation'],
    score:null, format:v=>fmt(v,1)+'%', dataKey:'hashrate_30d_change_pct', historyKey:'hashrate',
  },
};

// ============ CHART ============
function renderChart(history, level, format, tooltipId) {
  if (!history || history.length < 2) {
    return `<div class="no-history">Historie wird aufgebaut (${history?.length||0} Punkt${(history?.length||0)===1?'':'e'}) – wächst bei jedem Refresh</div>`;
  }
  const w=600, h=160, pad={l:8,r:8,t:8,b:8};
  const vals=history.map(p=>p.v), times=history.map(p=>p.t);
  const min=Math.min(...vals), max=Math.max(...vals), range=max-min||1;
  const tMin=Math.min(...times), tMax=Math.max(...times), tRange=tMax-tMin||1;
  const xFor=t=>pad.l+((t-tMin)/tRange)*(w-pad.l-pad.r);
  const yFor=v=>pad.t+(1-(v-min)/range)*(h-pad.t-pad.b);
  let d='', area='';
  history.forEach((p,i)=>{
    const x=xFor(p.t).toFixed(1), y=yFor(p.v).toFixed(1);
    d+=(i===0?'M':'L')+x+','+y+' ';
    area+=(i===0?'M':'L')+x+','+y+' ';
  });
  area+=`L${xFor(tMax).toFixed(1)},${(h-pad.b).toFixed(1)} L${xFor(tMin).toFixed(1)},${(h-pad.b).toFixed(1)} Z`;
  const last=history[history.length-1];
  const dj=JSON.stringify(history).replace(/"/g,'&quot;');
  return `
    <div class="chart-wrap">
      <div class="chart-tooltip" id="${tooltipId}">
        <span class="t-val">${format(last.v)}</span>
        <span class="t-date">${fmtDate(last.t)}</span>
      </div>
      <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"
           data-history="${dj}" data-tooltip="${tooltipId}"
           onmousemove="chartHover(event,this)" ontouchmove="chartHover(event,this)" onmouseleave="chartReset(this)">
        <defs>
          <linearGradient id="g-${tooltipId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="currentColor" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <g class="stroke-${level}" style="color:var(--${level})">
          <path d="${area}" fill="url(#g-${tooltipId})" stroke="none"/>
          <path d="${d}" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="${xFor(last.t)}" cy="${yFor(last.v)}" r="3" fill="currentColor"/>
        </g>
        <line id="cur-${tooltipId}" x1="0" y1="0" x2="0" y2="${h}" stroke="var(--text-muted)" stroke-width="0.5" stroke-dasharray="3,3" style="opacity:0"/>
        <circle id="dot-${tooltipId}" cx="0" cy="0" r="3.5" fill="var(--${level})" stroke="var(--bg)" stroke-width="1.5" style="opacity:0"/>
      </svg>
      <div class="chart-range"><span>${fmtDate(tMin)}</span><span>${fmtDate(tMax)}</span></div>
    </div>`;
}

function chartHover(e, svg) {
  e.preventDefault();
  const history=JSON.parse(svg.getAttribute('data-history').replace(/&quot;/g,'"'));
  const tid=svg.getAttribute('data-tooltip');
  const rect=svg.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const ratio=Math.max(0,Math.min(1,(cx-rect.left)/rect.width));
  const idx=Math.round(ratio*(history.length-1));
  const p=history[idx]; if(!p) return;
  const w=600,h=160,pad={l:8,r:8,t:8,b:8};
  const vals=history.map(x=>x.v),times=history.map(x=>x.t);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const tMin=Math.min(...times),tMax=Math.max(...times),tRange=tMax-tMin||1;
  const xF=t=>pad.l+((t-tMin)/tRange)*(w-pad.l-pad.r);
  const yF=v=>pad.t+(1-(v-min)/range)*(h-pad.t-pad.b);
  const cur=document.getElementById('cur-'+tid), dot=document.getElementById('dot-'+tid);
  if(cur){cur.setAttribute('x1',xF(p.t));cur.setAttribute('x2',xF(p.t));cur.style.opacity='0.5';}
  if(dot){dot.setAttribute('cx',xF(p.t));dot.setAttribute('cy',yF(p.v));dot.style.opacity='1';}
  const mkey=svg.closest('.metric-card')?.getAttribute('data-key');
  const format=METRICS[mkey]?.format||(v=>fmt(v));
  const tip=document.getElementById(tid);
  if(tip) tip.innerHTML=`<span class="t-val">${format(p.v)}</span><span class="t-date">${fmtDate(p.t)}</span>`;
}

function chartReset(svg) {
  const tid=svg.getAttribute('data-tooltip');
  const history=JSON.parse(svg.getAttribute('data-history').replace(/&quot;/g,'"'));
  const last=history[history.length-1];
  const cur=document.getElementById('cur-'+tid), dot=document.getElementById('dot-'+tid);
  if(cur) cur.style.opacity='0';
  if(dot) dot.style.opacity='0';
  const mkey=svg.closest('.metric-card')?.getAttribute('data-key');
  const format=METRICS[mkey]?.format||(v=>fmt(v));
  const tip=document.getElementById(tid);
  if(tip&&last) tip.innerHTML=`<span class="t-val">${format(last.v)}</span><span class="t-date">${fmtDate(last.t)}</span>`;
}

function toggleCard(key) {
  expandedCard = expandedCard===key ? null : key;
  render();
}

function toggleAggregate() {
  aggExpanded = !aggExpanded;
  render();
}

function renderCard(key, data, history) {
  const m=METRICS[key];
  let value = key==='drawdown'
    ? ((data.price_usd&&data.ath_usd)?((data.price_usd-data.ath_usd)/data.ath_usd)*100:null)
    : data[m.dataKey];
  const score=m.score?m.score(value):null;
  const level=score?.level||'gray';
  const isExpanded=expandedCard===key;
  const hist=history?.[m.historyKey];
  const tid='tt-'+key;
  return `
    <div class="metric-card bg-${level} ${isExpanded?'expanded':''}" data-key="${key}" onclick="toggleCard('${key}')">
      <div class="metric-head">
        <div class="metric-main">
          <div class="metric-title-row">${m.title}</div>
          <div class="metric-desc">${m.desc}</div>
          <div class="metric-value-row">
            <div class="metric-value">${value!=null?m.format(value):'—'}</div>
            ${score?`<div class="metric-label ${level}">${score.label}</div>`:''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <div class="dot dot-${level}"></div>
          <div class="chevron">▼</div>
        </div>
      </div>
      <div class="metric-body">
        <div class="metric-body-inner">
          <div class="metric-info">${m.info}</div>
          <div class="metric-thresholds">${m.thresholds.map(t=>`<span class="threshold">${t}</span>`).join('')}</div>
          ${isExpanded?renderChart(hist,level,m.format,tid):''}
        </div>
      </div>
    </div>`;
}

// ============ RENDER ============
function render() {
  const app=document.getElementById('app');
  const d=lastData?.data||{};
  const h=lastData?.history||{};
  const drawdownPct=(d.price_usd&&d.ath_usd)?((d.price_usd-d.ath_usd)/d.ath_usd)*100:null;
  const priceChf=d.price_usd?convertPrice(d.price_usd):(d.price_chf||0);
  const priceOverride=priceChf>=200000;

  const allScores=[
    scoreMvrvZ(d.mvrv_z), scoreMvrvRatio(d.mvrv_ratio), scoreMayer(d.mayer_multiple),
    scoreNupl(d.nupl), scoreSopr(d.sopr), scoreSupply(d.supply_in_profit_pct),
    scorePi(d.pi_cycle_ratio), scoreDD(drawdownPct), scoreFG(d.fear_greed),
  ].filter(Boolean);
  const agg=allScores.length?Math.round(allScores.reduce((a,s)=>a+s.score,0)/allScores.length):null;
  const aggInfo=aggregateLevel(priceOverride?0:agg);

  const bewertungScore=catAvg([scoreMvrvZ(d.mvrv_z),scoreMvrvRatio(d.mvrv_ratio),scoreMayer(d.mayer_multiple)]);
  const holderScore=catAvg([scoreNupl(d.nupl),scoreSopr(d.sopr),scoreSupply(d.supply_in_profit_pct)]);
  const zyklusScore=catAvg([scorePi(d.pi_cycle_ratio),scoreDD(drawdownPct)]);
  const stimmungScore=catAvg([scoreFG(d.fear_greed)]);
  const timestamp=lastData?.timestamp?new Date(lastData.timestamp).toLocaleString('de-CH'):'';

  const phases=[
    {range:'75–100',level:'green', label:'Akkumulation',icon:'❄️',text:'Markt breit unterbewertet, Angst dominiert. Historisch seltenste und wertvollste Phase. Für Holder: DCA konsequent fortsetzen, ggf. erhöhen. Rückkauf-Zone wenn du vorher verkauft hast.'},
    {range:'55–74', level:'green', label:'Günstig',     icon:'📈',text:'Fair bis günstig bewertet, noch keine Euphorie. Normale Bullmarkt-Phase. Für Holder: Sparplan weiterlaufen lassen, keine Aktion nötig.'},
    {range:'40–54', level:'yellow',label:'Neutral',     icon:'⚖️',text:'Metriken gemischt. Typisch für Übergangsphasen. Für Holder: DCA fortsetzen, keine Gewinnmitnahmen bei BTC.'},
    {range:'25–39', level:'orange',label:'Vorsicht',    icon:'⚠️',text:'Mehrere Metriken zeigen Überhitzung. Für Holder: DCA weiter, bei Altcoins (SOL/KAS) erste Stufen-Verkäufe prüfen. BTC noch kein Verkauf.'},
    {range:'0–24',  level:'red',   label:'Distribution',icon:'🔥',text:'Euphoriezone. Historisch nahe Zyklushochs. Für Holder: 0.02 BTC verkaufen → Cash halten. Altcoin-Verkäufe ausführen. Warte auf Score > 75 für Rückkauf.'},
  ];

  const isCurrentPhase=(p)=>{
    if(priceOverride) return p.range==='0–24';
    if(agg==null) return false;
    if(p.range==='75–100') return agg>=75;
    if(p.range==='55–74')  return agg>=55&&agg<75;
    if(p.range==='40–54')  return agg>=40&&agg<55;
    if(p.range==='25–39')  return agg>=25&&agg<40;
    return agg<25;
  };

  app.innerHTML=`
    <div class="header">
      <div class="title">
        <div class="btc-icon">₿</div>
        <div>On-Chain Dashboard</div>
      </div>
      <div class="header-right">
        <div class="currency-switch">
          ${['CHF','USD','EUR'].map(c=>`<button class="${c===currency?'active':''}" onclick="currency='${c}';localStorage.setItem('btc_currency','${c}');render()">${c}</button>`).join('')}
        </div>
        <button class="refresh-btn ${isLoading?'refreshing':''}" onclick="fetchData()" ${isLoading?'disabled':''}>
          <span class="refresh-icon">↻</span>${isLoading?'Lädt…':'Aktualisieren'}
        </button>
        <button class="analyze-btn" id="analyzeBtn" onclick="requestAnalysis()">
          <span>🧠</span> Analyse
        </button>
      </div>
    </div>

    ${lastError?`<div class="error-box"><strong>Fehler:</strong> ${lastError}</div>`:''}

    ${d.price_usd?`
      <div class="price-row">
        <div class="price-clickable" onclick="toggleCurrency()" title="Tippen zum Wechseln">
          <span class="price">${fmtInt(priceChf)} ${currency}</span>
          ${drawdownPct!=null?`<span class="price-change">${drawdownPct.toFixed(1)}% vs ATH</span>`:''}
        </div>
        <div class="timestamp">${timestamp}</div>
      </div>`:''}

    <div class="aggregate bg-${aggInfo.level} ${aggExpanded?'expanded':''}" onclick="toggleAggregate()">
      <div class="aggregate-inner">
        <div>
          <div class="aggregate-label">Aggregat-Score · 9 Metriken</div>
          <div><span class="aggregate-score">${agg??'—'}</span><span class="aggregate-score-unit">/ 100</span></div>
          <div class="aggregate-status ${aggInfo.level}">${aggInfo.icon} ${priceOverride?'Preis-Alarm':aggInfo.label}</div>
          ${priceOverride?`
            <div class="price-alarm">
              🔴 PREIS-ALARM: ${fmtInt(priceChf)} ${currency} ≥ 200'000 CHF
              <span>Verkaufsregel aktiv – unabhängig vom Score.<br>Nächste Aktion: 0.02 BTC verkaufen → Cash halten.</span>
            </div>`:''}
        </div>
        <div class="circle-wrap">
          <svg viewBox="0 0 100 100" width="84" height="84">
            <circle class="circle-bg" cx="50" cy="50" r="42"/>
            <circle class="circle-fill ${aggInfo.level}" stroke="currentColor" cx="50" cy="50" r="42"
                    stroke-dasharray="${(agg||0)*2.64} 264"/>
          </svg>
        </div>
      </div>

      ${!aggExpanded?`<div class="aggregate-hint">Tippen für Erklärung ▼</div>`:''}

      <div class="aggregate-body" onclick="event.stopPropagation()">
        <div style="font-size:12px;line-height:1.6;color:var(--text-muted);margin-bottom:16px;">
          Der Aggregat-Score ist der Durchschnitt aus 9 Metriken (Skala 0–100). Höher = günstiger für Einstieg/Halten, niedriger = Vorsicht.<br>
          <strong style="color:var(--text)">Verkaufsregel:</strong> Score &lt; 25 <em>oder</em> Preis ≥ 200'000 CHF → 0.02 BTC verkaufen → Cash.<br>
          <strong style="color:var(--text)">Rückkaufregel:</strong> Score &gt; 75 und Preis mind. 40% unter Verkaufspreis → Cash → BTC.
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${phases.map(p=>{
            const active=isCurrentPhase(p);
            return `<div style="padding:10px 12px;border-radius:10px;border:1px solid ${active?'var(--'+p.level+')':'var(--border)'};background:${active?'rgba(255,255,255,0.02)':'transparent'};${active?'box-shadow:0 0 0 1px var(--'+p.level+')':''}"">
              <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-size:14px">${p.icon}</span>
                  <span style="font-weight:600;font-size:12.5px" class="${p.level}">${p.label}</span>
                  ${active?'<span style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-left:4px">← du bist hier</span>':''}
                </div>
                <span style="font-size:11px;font-variant-numeric:tabular-nums;color:var(--text-dim)">${p.range}</span>
              </div>
              <div style="font-size:11.5px;line-height:1.5;color:var(--text-muted)">${p.text}</div>
            </div>`;
          }).join('')}
        </div>
        <div style="font-size:10px;color:var(--text-dim);text-align:center;margin-top:14px;opacity:0.6">Tippen zum Schliessen</div>
      </div>
    </div>

    <div id="analysisBox" class="analysis-box" style="display:none">
      <div class="analysis-header">
        <span>🧠 DeepSeek Experten-Analyse</span>
        <button onclick="closeAnalysis()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px">✕</button>
      </div>
      <div id="analysisContent" class="analysis-content"></div>
    </div>

    <div class="category">
      <div class="category-header">
        <span class="category-title">🔍 Bewertung</span>
        ${bewertungScore!=null?`<span class="category-score">Ø ${bewertungScore}</span>`:''}
      </div>
      <div class="grid">
        ${renderCard('mvrv_z',d,h)}
        ${renderCard('mvrv_ratio',d,h)}
        ${renderCard('mayer',d,h)}
      </div>
    </div>

    <div class="category">
      <div class="category-header">
        <span class="category-title">👥 Holder-Verhalten</span>
        ${holderScore!=null?`<span class="category-score">Ø ${holderScore}</span>`:''}
      </div>
      <div class="grid">
        ${renderCard('nupl',d,h)}
        ${renderCard('sopr',d,h)}
        ${renderCard('supply_in_profit_pct',d,h)}
      </div>
    </div>

    <div class="category">
      <div class="category-header">
        <span class="category-title">📊 Zyklus-Position</span>
        ${zyklusScore!=null?`<span class="category-score">Ø ${zyklusScore}</span>`:''}
      </div>
      <div class="grid">
        ${renderCard('pi_cycle',d,h)}
        ${renderCard('drawdown',d,h)}
      </div>
    </div>

    <div class="category">
      <div class="category-header">
        <span class="category-title">💭 Stimmung</span>
        ${stimmungScore!=null?`<span class="category-score">Ø ${stimmungScore}</span>`:''}
      </div>
      <div class="grid">
        ${renderCard('fear_greed',d,h)}
        ${renderCard('hashrate',d,h)}
      </div>
    </div>

    <div style="text-align:center;font-size:10px;color:var(--text-dim);margin-top:24px;padding:16px">
      Tippen zum Aufklappen · Chart wischen für Werte<br>
      Quellen: Kraken · Bitcoin Lab · alternative.me · mempool.space
    </div>`;
}

fetchData();
</script>
